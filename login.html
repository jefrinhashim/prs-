<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> – Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
 <link rel="stylesheet" href="login.css" />

</head>
<body>

<div class="card">

  <!-- LEFT PANEL -->
  <div class="left">
    <img src="images/loginpic.jpg" class="loginpicture" alt="Background" class="bg-img"/>
    <div class="ring-outer"></div>
    <span class="left-tag">Global payments made simple – online payment solutions for you.</span>

    <div class="hero-text">
      <h1><span class="wheat-text">Personalized Health</span><br>Begins in Your DNA.</h1>
    </div>

    <div class="phone-wrap">
      <svg class="phone-svg" viewBox="0 0 220 440" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="logoGradPhone" x1="96" y1="381" x2="124" y2="409" gradientUnits="userSpaceOnUse">
            <stop offset="0%"   stop-color="#ff4500"/>
            <stop offset="50%"  stop-color="#ffaa00"/>
            <stop offset="100%" stop-color="#00c853"/>
          </linearGradient>
        </defs>
        <!-- Body -->
        <rect x="4" y="4" width="212" height="432" rx="32" fill="#111111"/>
        <rect x="4" y="4" width="212" height="432" rx="32" stroke="#2e2e2e" stroke-width="6"/>
        <rect x="12" y="12" width="196" height="416" rx="27" fill="#0e0e0e"/>
        <!-- Notch -->
        <rect x="72" y="20" width="76" height="22" rx="11" fill="#0e0e0e"/>
        <!-- Week label -->
        <text x="22" y="72" font-family="DM Sans,sans-serif" font-size="9" fill="rgba(255,255,255,0.4)">Week 4–10 July</text>
        <!-- Balance -->
        <text x="22" y="100" font-family="DM Sans,sans-serif" font-size="30" font-weight="800" fill="white">897.00</text>
        <text x="155" y="84" font-family="DM Sans,sans-serif" font-size="10" fill="rgba(255,255,255,0.4)">€</text>
        <!-- Chart bars -->
        <rect x="22"  y="148" width="18" height="50" rx="5" fill="#ff4500" opacity="0.7"/>
        <rect x="46"  y="135" width="18" height="63" rx="5" fill="#ff4500" opacity="0.85"/>
        <rect x="70"  y="120" width="18" height="78" rx="5" fill="#ff4500"/>
        <rect x="94"  y="142" width="18" height="56" rx="5" fill="#ff4500" opacity="0.75"/>
        <rect x="118" y="128" width="18" height="70" rx="5" fill="#ff4500" opacity="0.9"/>
        <rect x="142" y="155" width="18" height="43" rx="5" fill="#ff4500" opacity="0.6"/>
        <rect x="166" y="140" width="18" height="58" rx="5" fill="#ff4500" opacity="0.8"/>
        <!-- Day labels -->
        <text x="22"  y="212" font-family="DM Sans,sans-serif" font-size="7.5" fill="rgba(255,255,255,0.35)">Mon</text>
        <text x="46"  y="212" font-family="DM Sans,sans-serif" font-size="7.5" fill="rgba(255,255,255,0.35)">Tue</text>
        <text x="70"  y="212" font-family="DM Sans,sans-serif" font-size="7.5" fill="rgba(255,255,255,0.35)">Wed</text>
        <text x="94"  y="212" font-family="DM Sans,sans-serif" font-size="7.5" fill="rgba(255,255,255,0.35)">Thu</text>
        <text x="118" y="212" font-family="DM Sans,sans-serif" font-size="7.5" fill="rgba(255,255,255,0.35)">Fri</text>
        <text x="142" y="212" font-family="DM Sans,sans-serif" font-size="7.5" fill="rgba(255,255,255,0.35)">Sat</text>
        <text x="166" y="212" font-family="DM Sans,sans-serif" font-size="7.5" fill="rgba(255,255,255,0.35)">Sun</text>
        <!-- Category -->
        <text x="22" y="238" font-family="DM Sans,sans-serif" font-size="9" fill="rgba(255,255,255,0.4)">Category</text>
        <rect x="22"  y="246" width="82" height="46" rx="10" fill="#1a1a1a"/>
        <text x="34"  y="264" font-family="DM Sans,sans-serif" font-size="9" fill="rgba(255,255,255,0.5)">Travel</text>
        <text x="34"  y="280" font-family="DM Sans,sans-serif" font-size="11" font-weight="700" fill="white">950.00</text>
        <rect x="112" y="246" width="82" height="46" rx="10" fill="#1a1a1a"/>
        <text x="122" y="264" font-family="DM Sans,sans-serif" font-size="9" fill="rgba(255,255,255,0.5)">Shopping</text>
        <text x="122" y="280" font-family="DM Sans,sans-serif" font-size="11" font-weight="700" fill="white">785.00</text>
        <!-- Small row -->
        <rect x="22" y="302" width="56" height="14" rx="4" fill="#1e1e1e"/>
        <text x="30" y="313" font-family="DM Sans,sans-serif" font-size="7" fill="rgba(255,255,255,0.3)">50.00</text>
        <!-- Bottom nav bar -->
        <rect x="12" y="368" width="196" height="60" rx="0" fill="#111111"/>
        <rect x="12" y="368" width="196" height="1" fill="rgba(255,255,255,0.06)"/>
        <rect x="30" y="384" width="16" height="14" rx="3" fill="rgba(255,255,255,0.15)"/>
        <rect x="58" y="384" width="7" height="7" rx="1.5" fill="rgba(255,255,255,0.25)"/>
        <rect x="67" y="384" width="7" height="7" rx="1.5" fill="rgba(255,255,255,0.25)"/>
        <rect x="58" y="393" width="7" height="7" rx="1.5" fill="rgba(255,255,255,0.25)"/>
        <rect x="67" y="393" width="7" height="7" rx="1.5" fill="rgba(255,255,255,0.25)"/>
        <circle cx="110" cy="393" r="13" fill="#0e0e0e" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
        <circle cx="110" cy="393" r="8" fill="none" stroke="url(#logoGradPhone)" stroke-width="2.5"/>
        <circle cx="144" cy="390" r="3" fill="rgba(255,255,255,0.25)"/>
        <circle cx="152" cy="390" r="3" fill="rgba(255,255,255,0.25)"/>
        <circle cx="160" cy="390" r="3" fill="rgba(255,255,255,0.25)"/>
        <circle cx="178" cy="384" r="2" fill="rgba(255,255,255,0.2)"/>
        <circle cx="184" cy="384" r="2" fill="rgba(255,255,255,0.2)"/>
        <circle cx="178" cy="390" r="2" fill="rgba(255,255,255,0.2)"/>
        <circle cx="184" cy="390" r="2" fill="rgba(255,255,255,0.2)"/>
        <circle cx="178" cy="396" r="2" fill="rgba(255,255,255,0.2)"/>
        <circle cx="184" cy="396" r="2" fill="rgba(255,255,255,0.2)"/>
        <!-- Home bar -->
        <rect x="80" y="430" width="60" height="4" rx="2" fill="rgba(255,255,255,0.2)"/>
      </svg>
    </div>

    <div class="a11y-icon" title="Accessibility">
      <svg viewBox="0 0 24 24" fill="none" stroke="rgba(255,165,0,0.9)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="5" r="2"/>
        <path d="M12 7v6m-4-4 4 1 4-1M10 17l-2 4m4-4v4m2-4 2 4"/>
      </svg>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="right">
    <nav class="right-nav">
      <a class="logo" href="#">
        <svg class="logo-icon" viewBox="0 0 30 30" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="payGrad" x1="3" y1="3" x2="27" y2="27" gradientUnits="userSpaceOnUse">
              <stop offset="0%"   stop-color="#ff4500"/>
              <stop offset="33%"  stop-color="#ffaa00"/>
              <stop offset="66%"  stop-color="#00cc66"/>
              <stop offset="100%" stop-color="#0099ff"/>
            </linearGradient>
          </defs>
        
        </svg>
        <span class="logo-text"><span class="logo-green">Polygenic</span> RiskScore</span>
      </a>
      <button class="signup-btn" onclick="handleSignup()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        Sign Up
      </button>
    </nav>

    <div class="form-area">
      <h2 class="form-title">Sign In</h2>

      <div class="field" id="emailField">
        <input type="text" id="emailInput" placeholder="Email or Username" autocomplete="username"/>
        <span class="error-msg" id="emailError">Please enter your email or username.</span>
      </div>

      <div class="field" id="passField">
        <input type="password" id="passInput" placeholder="Password" autocomplete="current-password"/>
        <button class="toggle-pw" id="togglePw" type="button" aria-label="Toggle password visibility">
          <svg id="eyeOff" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
            <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
            <line x1="1" y1="1" x2="23" y2="23"/>
          </svg>
          <svg id="eyeOn" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="display:none">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
        <span class="error-msg" id="passError">Please enter your password.</span>
      </div>

      <a href="#" class="forgot" onclick="handleForgot(event)">Forgot password?</a>

      <button class="btn-signin" id="signinBtn" onclick="handleSignin()">
        <span class="arrow-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
            <polyline points="10 17 15 12 10 7"/>
            <line x1="15" y1="12" x2="3" y2="12"/>
          </svg>
        </span>
        <span id="btnText">Sign In</span>
        <div class="spinner" id="spinner"></div>
      </button>
    </div>

    <footer class="right-footer">
      <span class="footer-copy">© Prs Inc.</span>
      <div class="footer-links">
        <a href="#">Contact Us</a>
        <button class="lang-btn">
          English
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </button>
      </div>
    </footer>
  </div>

</div>


<script src="./login.js"></script>
</body>
</html>
